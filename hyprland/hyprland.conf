# Hyprtasking (Plugin){{{
# bind = $mainMod CONTROL SHIFT, T, hyprtasking:toggle, all
# bind = $mainMod SHIFT, T, hyprtasking:toggle, cursor

# bind = $mainMod, H, hyprtasking:move, left
# bind = $mainMod, J, hyprtasking:move, down
# bind = $mainMod, K, hyprtasking:move, up
# bind = $mainMod, L, hyprtasking:move, right
plugin {
    hyprtasking {
        layout = grid

        gap_size = 20
        bg_color = $background
        border_size = 4
        # exit_behavior = active hovered interacted original
        gaps {
            rows = 3
        }
        grid {
            rows = 3
            cols = 3
        }
        linear {
            height = 300
            scroll_speed = 1.1;
        }
    }
}
