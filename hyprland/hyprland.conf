# Welcome to my hyprland.conf!
# General / Miscelaneous {{{

# Ember theme colors
source = ~/nix_config/hyprland/colors-hyprland.conf

misc {
  disable_hyprland_logo = true
  exit_window_retains_fullscreen = true # If closing a full screen window, make the next active one full screen too
  # Swallowing means that if a program spawns a GUI, then the terminal dissapears
  # It reopens upon program being closed
  enable_swallow = true
  # Matches class
  swallow_regex = ^kitty
}

general {
  layout = hy3
  resize_on_border = true

  border_size = 5
  # col.active_border = 0xffb072d1 0xffb072d1 190  # Does not work
  col.active_border = $color1 $color3 $color1 90deg
  col.inactive_border = $color6

  # col.active_alt_monitor = $color1 $color3 $color1 90deg # default: rgba(60606040)
  # col.active_alt_monitor.border = $color6 # default: rgba(808080ee)

  gaps_in = 0
  gaps_out = 0

  snap {
    enabled = true
    window_gap = 25 # pixels
    monitor_gap = 10 # pixels
    border_overlap = true
  }
}

input {
  follow_mouse = 1
  kb_layout = us
  kb_options = caps:escape
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  touchpad {
    clickfinger_behavior = true # 2 finger right click
    drag_lock = true # can remove finger for a short time while dragging
    natural_scroll = no
    disable_while_typing = true
    scroll_factor = 0.8  # Reduce as default of 1 is too much
  }
}

# device {
#   name = logitech-g502-1
#   sensitivity = -0.9 # 40% of default
# }
# }}}
# Monitors {{{

# monitor = name, resolution, position, scale
monitor =,preferred,auto,1  # No preference, but scale to 1 please

# workspace= 1, monitor:HDMI-A-1
# workspace= 2, monitor:DP-1
# workspace= 2, monitor:DP-2
# workspace= 9, monitor:eDP-1
# }}}
# Envs {{{
# As per https://wiki.hyprland.org/Nvidia/
# To get multi monitor working
env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm  # crashes firefox
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Which GPU to run Hyprland on. To find card names: ls -l /dev/dri/by-path
# env = AQ_DRM_DEVICES, /dev/dri/card0:/dev/dri/card1  # Try amdgpu, otherwise NVIDIA
# env = AQ_DRM_DEVICES, /dev/dri/card0: # amdgpu only. Makes HDMI not accessible :(
# }}}
# Execs {{{
exec-once = fcitx5
exec-once = pypr

exec-once = hyprctl dispatch workspace 2 # Start on terminal workspace

# # make sure you have the right environment variables in wayland (TODO: better way to do this?)
# exec-once = i3bar-river
exec-once = noctalia

# exec-once = awww-daemon && sleep 0.1
# exec-once = awww img ~/nix_config/wallpapers/fox_in_the_woods.jpg

# Notification daemon
exec-once = swaync

# Cool launcher
exec-once = vicinae server

# }}}
# Cursor {{{
cursor {
  inactive_timeout = 5
  no_hardware_cursors = true
}
# }}}
# Decoration {{{

$opacity = 0.90
$inactive_opacity = 0.8
$fullscreen_opacity = 1.

decoration {
  active_opacity = $opacity
  inactive_opacity = $inactive_opacity
  fullscreen_opacity = $fullscreen_opacity
  rounding = 5
  blur {
    enabled = yes
    size = 8
    passes = 4
    ignore_opacity = true
  }
}
# }}}
# Animations {{{
animations {
  enabled = yes


  # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 7, myBezier
  animation = windowsOut, 1, 7, default, popin 80%
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, default
  animation = workspaces, 1, 6, default
}
# }}}
# Gestures  {{{
gesture = 3, up, scale:1.5, resize
gesture = 3, horizontal, move
# gesture = 3, pinchin, float, tile
gesture = 4, up, fullscreen
gesture = 4, down, float
gesture = 4, horizontal, scale:0.5, workspace
# }}}
# Binds {{{
# Bind flags
# l -> locked, aka. works also when an input inhibitor (e.g. a lockscreen) is active.
# r -> release, will trigger on release of a key.
# e -> repeat, will repeat when held.
# n -> non-consuming, key/mouse events will be passed to the active window in addition to triggering the dispatcher.
# m -> mouse
# t -> transparent, cannot be shadowed by other binds.
# i -> ignore mods, will ignore modifiers.

binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  hide_special_on_workspace_change = true
}


