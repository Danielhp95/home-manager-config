# Hyprtasking (Plugin){{{
# bind = $mainMod CONTROL SHIFT, T, hyprtasking:toggle, all
# bind = $mainMod SHIFT, T, hyprtasking:toggle, cursor

# bind = $mainMod, H, hyprtasking:move, left
# bind = $mainMod, J, hyprtasking:move, down
# bind = $mainMod, K, hyprtasking:move, up
# bind = $mainMod, L, hyprtasking:move, right
plugin {
    hyprtasking {
        layout = grid

        gap_size = 20
        bg_color = $background
        border_size = 4
        # exit_behavior = active hovered interacted original
        gaps {
            rows = 3
        }
        grid {
            rows = 3
            cols = 3
        }
        linear {
            height = 300
            scroll_speed = 1.1;
        }
    }
}
# }}}
# Window Rules {{{

# named rule syntax (Hyprland 0.53+)
# blur
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

# disable animation for vicinae only
layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}

# Workspace specific applications
# Workspace assignments
windowrule {
    name = firefox-ws1
    match:class = firefox
    workspace = 1
}

windowrule {
    name = steam-ws6
    match:class = steam
    workspace = 6
}

windowrule {
    name = spotify-ws8
    match:title = Spotify
    workspace = 8
}

windowrule {
    name = messaging-apps
    match:class = ^(Slack|org\.telegram\.desktop|Element)$
    workspace = 9
}

# No animations for layer surfaces
layerrule {
    name = no_anim
    match:namespace = ^(rofi|grim|hyprshot)$
    no_anim = on
}

# Floating windows
windowrule {
    name = float-general-title
    match:title = ^(Weather|MainPicker)$
    float = true
}

windowrule {
    name = float-general
    match:class = ^(io\.github\.amit9838\.mousam|Rofi|org\.pulseaudio\.pavucontrol|blueberry|mpv|imv|satty)$
    float = true
}

windowrule {
    name = float-zoom-host
    match:initial_title = zoom
    float = true
}

windowrule {
    name = pavucontrol
    size = 1200 900
    float = true
    center = true
}

windowrule {
    name = tile-grayjay
    match:title = GrayJay
    tile = true
}

# Opacity configuration

windowrule {
    name = opacity-multiclass
    match:class = ^(pavucontrol|zoom|firefox|satty|mpv|matplotlib)$
    opacity = 1.0 override 1.0 override
}

# Kitty: ensure default opacity even when fullscreen
windowrule {
    name = opacity-kitty-fullscreen
    match:class = kitty
    match:fullscreen = 1
    opacity = 0.9 override 0.9 override
}

windowrule {
    name = opacity-weather
    match:title = Weather
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = opacity-zoom-initial
    match:initial_title = zoom
    opacity = 1.0 override 1.0 override
}
# more info on: https://wiki.hyprland.org/Configuring/Workspace-Rules/
# To replicate “smart gaps” / “no gaps when only” from other WMs/Compositors
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
# }}}
