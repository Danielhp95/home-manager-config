# Window Rules {{{

# Workspace specific applications
windowrule = workspace 1, class:(firefox)
windowrule = workspace 6, class:(steam)$
windowrule = workspace 8, title:(Spotify)$
windowrule = workspace 9, class:(Slack)$
windowrule = workspace 9, class:(org.telegram.desktop)
windowrule = workspace 9, class:(Element)

# No animations
layerrule = noanim, rofi
# These 2 are not working
layerrule = noanim, grim  # used by hyprshot
layerrule = noanim, hyprshot  # used by hyprshot


# Floating windows
windowrule = float, title:{Weather}
windowrule = float, class:(io.github.amit9838.mousam)
windowrule = float, class:{Rofi}
windowrule = float, class:(org.pulseaudio.pavucontrol)
windowrule = float, class:{blueberry}
windowrule = float, class:{mpv}
windowrule = float, class:{imv}
windowrule = float, class:{satty}
windowrule = float, title:(MainPicker)  # Screensharing window selection
windowrule = float, initialtitle:(zoom)  # For the "X is now host window"
windowrule = float, initialtitle:(zoom)  # For the "X is now host window"
# TODO: make window NOT float
# windowrule = float, title:(GrayJay)

# Opacity configuration
windowrule = opacity 1.0 override 1.0 override, class:(zoom)
windowrule = opacity 1 override, 1 override, class:(org.wezfurlong.wezterm)
windowrule = opacity 1.0 override 1.0 override, title:{Weather}
windowrule = opacity 1.0 override 1.0 override, class:(firefox)
windowrule = opacity 1.0 override 1.0 override, class:{satty}
windowrule = opacity 1.0 override 1.0 override, class:{mpv}
windowrule = opacity 1.0 override 1.0 override, class:(mpv), fullscreen:1
windowrule = opacity 1.0 override 1.0 override, initialtitle:(zoom)
windowrule = opacity 1.0 override 1.0 override, class:{matplotlib}
windowrule = opacity 1.0 override 1.0 override, class:{pavucontrol}
windowrule = opacity 1.0 override 1.0 override, class:(steam_app_)(.*) # doesn't work

# more info on: https://wiki.hyprland.org/Configuring/Workspace-Rules/
# To replicate “smart gaps” / “no gaps when only” from other WMs/Compositors
# No gaps when w# workspace = w[t1], gapsout:0, gapsin:0
workspace = w[tg1], gapsout:0, gapsin:0
workspace = fullscreen[1], gapsout:0, gapsin:0
windowrule = bordersize 0, floating:0, onworkspace:w[t1]
windowrule = rounding 0, floating:0, onworkspace:w[t1]
windowrule = bordersize 0, floating:0, onworkspace:w[tg1]
windowrule = rounding 0, floating:0, onworkspace:w[tg1]
windowrule = bordersize 0, floating:0, onworkspace:f[1]
windowrule = rounding 0, floating:0, onworkspace:f[1]
