# ═══════════════════════════════════════════════════════════════════════════════
# EMBER THEME - Hyprland Color Variables
# Based on: https://github.com/ember-theme/nvim
# ═══════════════════════════════════════════════════════════════════════════════

# Base colors
$foreground = rgb(d8d0c0)  # fg0 - primary text
$background = rgb(1c1b19)  # bg0 - base background

# Background layers (darkest to lightest)
$bg0 = rgb(1c1b19)  # base background
$bg1 = rgb(2c2b29)  # surface layer 1
$bg2 = rgb(3c3b39)  # surface layer 2
$bg3 = rgb(4c4b49)  # surface layer 3

# Foreground/text colors (bright to muted)
$fg0 = rgb(d8d0c0)  # primary text
$fg1 = rgb(b8b0a0)  # secondary text
$fg2 = rgb(989088)  # muted text

# Accent colors
$steel = rgb(7890a0)      # muted blue
$sage = rgb(80a090)       # teal-ish
$olive = rgb(8a9868)      # greenish
$gold = rgb(c8b468)       # yellow
$orange = rgb(c09058)     # orange
$coral = rgb(e08060)      # hero accent (red)
$mauve = rgb(988090)      # faint violet
$rose = rgb(b07878)       # dusty rose

# ANSI colors (for compatibility with other tools)
$color0 = rgb(1c1b19)   # black - bg0
$color1 = rgb(e08060)   # red - coral
$color2 = rgb(8a9868)   # green - olive
$color3 = rgb(c8b468)   # yellow - gold
$color4 = rgb(7890a0)   # blue - steel
$color5 = rgb(988090)   # magenta - mauve
$color6 = rgb(80a090)   # cyan - sage
$color7 = rgb(d8d0c0)   # white - fg0
$color8 = rgb(6e6a66)   # bright black
$color9 = rgb(ff6b4a)   # bright red
$color10 = rgb(b8d8a3)  # bright green
$color11 = rgb(e5c07b)  # bright yellow
$color12 = rgb(8ab4f8)  # bright blue
$color13 = rgb(d19a66)  # bright magenta
$color14 = rgb(7fbbb3)  # bright cyan
$color15 = rgb(ffffff)  # bright white
