# Ember theme for fcitx5
# See https://github.com/ember-theme/ember for palette
# This should be installed as Ember.conf into $out/share/fcitx5/themes/Ember/Ember.conf by the package.nix

[Metadata]
Name=Ember
Version=1.0
Author=ember-theme (see github.com/ember-theme/ember)
Description=Warm monochrome input method theme with coral accent
ScaleWithDPI=True

# Ember palette (see header for key color references)
# bg:      #1c1b19
# fg:      #d8d0c0
# coral:   #e08060 (accent)
# gold:    #c8b468
# steel:   #7890a0
# rose:    #b07878
# olive:   #8a9868
# sage:    #80a090
# orange:  #c09058
# mauve:   #988090

[InputPanel]
Font=Sans 13
# Unselected candidate color
NormalColor=#d8d0c0
# Selected candidate color (coral accent on dark background)
HighlightCandidateColor=#e08060
# Highlighted text foreground color (Ember fg)
HighlightColor=#d8d0c0
# Highlighted text background color (Ember accent/coral)
HighlightBackgroundColor=#e08060
# Input text color (main text)
InputColor=#e08060
# Background text (preedit, ghost, etc)
FooterColor=#b07878
# Border and indicators
BorderColor=#7890a0
Spacing=3

[InputPanel/TextMargin]
Left=10
Right=10
Top=6
Bottom=6

[InputPanel/Background]
Color=#1c1b19
BorderColor=#7890a0
BorderWidth=2

[InputPanel/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Highlight]
Color=#e08060

[InputPanel/Highlight/Margin]
Left=10
Right=10
Top=7
Bottom=7

[Menu/Background]
Color=#242320

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#e08060

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
Color=#b07878

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5

