# Colorscheme and status-line {{{

# Color variables (theme-agnostic names)

# ═══════════════════════════════════════════════════════════════════════════════
# EMBER THEME - A warm, monochrome color theme with coral spark
# ═══════════════════════════════════════════════════════════════════════════════
# Background colors (darkest to lightest)
set -g @color_bg0 "#1c1b19"  # base background
set -g @color_bg1 "#2c2b29"  # surface layer 1
set -g @color_bg2 "#3c3b39"  # surface layer 2
set -g @color_bg3 "#4c4b49"  # surface layer 3
# Foreground/text colors (bright to muted)
set -g @color_fg0 "#d8d0c0"  # primary text
set -g @color_fg1 "#b8b0a0"  # secondary text
set -g @color_fg2 "#989088"  # muted text
# Accent colors
set -g @color_blue "#7890a0"      # steel - muted blue
set -g @color_cyan "#80a090"      # sage - teal-ish
set -g @color_green "#8a9868"     # olive - greenish
set -g @color_yellow "#c8b468"    # gold
set -g @color_orange "#c09058"    # orange
set -g @color_red "#e08060"       # coral - hero accent
set -g @color_purple "#988090"    # mauve - faint violet
set -g @color_pink "#b07878"      # rose - dusty rose
# Unused but kept for compatibility
set -g @color_lavender "#988090"  # alias to mauve
set -g @color_sapphire "#7890a0"  # alias to steel
set -g @color_teal "#80a090"      # alias to sage
set -g @color_maroon "#b07878"    # alias to rose

