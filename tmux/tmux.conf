# Color definitions (Catppuccin Mocha palette)
# Base:     #1e1e2e | Surface0: #313244 | Surface1: #45475a | Surface2: #585b70
# Text:     #cdd6f4 | Subtext:  #a6adc8 | Overlay:  #6c7086
# Blue:     #89b4fa | Lavender: #b4befe | Sapphire: #74c7ec | Sky:      #89dceb
# Teal:     #94e2d5 | Green:    #a6e3a1 | Yellow:   #f9e2af | Peach:    #fab387
# Maroon:   #eba0ac | Red:      #f38ba8 | Mauve:    #cba6f7 | Pink:     #f5c2e7

## WINDOWS - Clean tab-style design
set -g window-status-separator ""

# Inactive windows - subtle and elegant
set -g window-status-format "#[fg=#{@color_bg2},bg=default]#[fg=#{@color_fg1},bg=#{@color_bg2}] #I #[fg=#{@color_fg2}]#{?window_last_flag,󰁯 ,}#{?window_zoomed_flag,󰊓 ,}#[fg=#{@color_fg1}]#W #[fg=#{@color_bg2},bg=default]"

# Active window - vibrant but refined
set -g window-status-current-format "#[fg=#{@color_blue},bg=default]#[fg=#{@color_bg0},bg=#{@color_blue},bold] #I #[fg=#{@color_blue},bg=#{@color_purple}]#[fg=#{@color_bg0},bg=#{@color_purple},bold]#{?window_zoomed_flag, 󰊓,} #W #[fg=#{@color_purple},bg=default]"

## STATUS LEFT / RIGHT
set -g status-left-length 50
set -g status-right-length 150

# Left status bar - Session indicator with elegant prefix highlight
set -g status-left "#{?client_prefix,#[fg=#{@color_pink}],#[fg=#{@color_green}]}#[bg=default]#{?client_prefix,#[bg=#{@color_pink}],#[bg=#{@color_green}]}#[fg=#{@color_bg0},bold]  #S #{?client_prefix,#[fg=#{@color_pink}],#[fg=#{@color_green}]}#[bg=default] "

# Right status bar - Elegant information display
set -g status-right ""

# Git branch (if in a git repo)
set -ga status-right "#[fg=#{@color_bg2},bg=default]#[fg=#{@color_purple},bg=#{@color_bg2}] 󰊢 #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '–') "

# CPU usage with icon
set -ga status-right "#[fg=#{@color_bg1},bg=#{@color_bg2}]#[fg=#{@color_cyan},bg=#{@color_bg1}]  #(bash -c 'read cpu a b c d rest < /proc/stat; idle1=\$d; total1=\$((a+b+c+d)); sleep 0.2; read cpu a b c d rest < /proc/stat; idle2=\$d; total2=\$((a+b+c+d)); echo \$((100 * (total2 - total1 - (idle2 - idle1)) / (total2 - total1)))%%') "

# RAM usage with icon
set -ga status-right "#[fg=#{@color_bg2},bg=#{@color_bg1}]#[fg=#{@color_green},bg=#{@color_bg2}] 󰍛 #(free -m | awk '/Mem:/ {printf(\"%.1fG\", \$3/1024)}') "

# Date with icon
set -ga status-right "#[fg=#{@color_bg1},bg=#{@color_bg2}]#[fg=#{@color_yellow},bg=#{@color_bg1}] 󰃭 %a %d "

# Time with elegant accent
set -ga status-right "#[fg=#{@color_blue},bg=#{@color_bg1}]#[fg=#{@color_bg0},bold,bg=#{@color_blue}]  %H:%M #[fg=#{@color_blue},bg=default]"

# MAYBE REVERT: two-line status bar so the command prompt / messages (drawn on
# status line 0) no longer overwrite the session name and window tabs.
# Line 0 is left empty for prompts; the normal statusline content moves to line 1.
# To revert: delete these three lines.
set -g status 2
set -gF status-format[1] "#{status-format[0]}"
set -g status-format[0] ""

# }}}
# Bindings {{{

# NOTE: <prefix> p is the tmux-thumbs hints table (bound in default.nix, whose
# plugin config is assembled *before* this file — an `unbind p` here would win
# and kill all the u/f/l/w hint bindings). Previous-window: use <mod><mod>.
# Set window split
bind-key v split-window -h
bind-key b split-window

bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# Make copy mode behave like vim
set -g mode-keys vi
# The -T ensures this binding only happens on table copy-mode-vi

bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi 'C-v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'v' send -X begin-selection \; send -X rectangle-toggle

# Switch to last active window
bind-key C-b last-window
# Switch to last active pane
bind C-a last-pane

# Use Alt + arrow (or vi bindings) keys to switch panes
# REMINDER: -n flag means "no prefix"
# -n: no prefix
# -r: repeatable
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind -n M-H resize-pane -L
bind -n M-L resize-pane -R
bind -n M-K resize-pane -U
bind -n M-J resize-pane -D

# bind HL to window traversal
bind -r H previous-window
bind -r L next-window

# New windows and panes start in the current directory
bind c new-window -c "#{pane_current_path}"

# Temporary tools in floating popups (vanish on exit, don't pollute the tab bar)
bind R display-popup -E -w 90% -h 90% -d "#{pane_current_path}" serpl
bind t display-popup -E -w 90% -h 90% btop
bind C display-popup -E -w 90% -h 90% -d "#{pane_current_path}" opencode
# }}}
# Miscelaneous {{{
# Don't ring any bells. And don't take over the status bar for a measly notification
set -g visual-activity off
set -g visual-bell off
set -g monitor-activity off
set -g bell-action none

# Allows to use the mouse for various actions such as scrolling or changing active pane.
set -g mouse on

# Start windows and panes index at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
set -g aggressive-resize on
