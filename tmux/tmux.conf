# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#                              TMUX CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# UI Layout {{{
set -as terminal-features '*:RGB'

# Pass extended keys (kitty keyboard protocol) through to apps like nvim.
# Without this tmux collapses Ctrl+Shift+<key> to Ctrl+<key>, so e.g. nvim
# can't tell <C-S-j> from <C-j>. Needed for FloatTerm's <C-S-j>/<C-S-k>.
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features '*:extkeys'

# Clickable OSC-8 hyperlinks (ls --hyperlink, delta, etc.) pass through tmux
set -as terminal-features '*:hyperlinks'

# To allow for base16 colors to propagate (this is needed from version 3.3 onwards)
set -g allow-passthrough on

# Takes environment from the parent shell (the shell that calls `tmux`)
set -ga update-environment EDITOR
# NB: never sync TERM from the attaching client — inside tmux, TERM must always be
# the default-terminal (tmux-256color). Syncing plants e.g. TERM=kitty in the
# session env, which leaks into panes and breaks nvim rendering.
set -ga update-environment TERM_PROGRAM

# Statusline options
set-option -g status-position top
set -g status-style "bg=default"
set -g status-justify left

set -g renumber-windows on
set -g status-keys vi
set -g status-interval 5

# Window's name changes according to the process being run on them
set -g automatic-rename on
set-option -g automatic-rename-format "#{b:pane_current_path}: #{pane_current_command}"

# look for other sessions when exiting last pane of session
set-option -g detach-on-destroy off

# Elegant pane borders - subtle but visible
set -g pane-active-border-style "fg=#{@color_blue}"
set -g pane-border-style "fg=#{@color_bg2}"
set -g pane-border-lines single

# Message and command styling
set -g message-style "fg=#{@color_fg0},bg=#{@color_bg1},bold"
set -g message-command-style "fg=#{@color_fg0},bg=#{@color_bg1}"

# Mode styling (copy mode, etc.)
set -g mode-style "fg=#{@color_bg0},bg=#{@color_blue},bold"

# Popup styling (display-popup, floax) — warm rounded borders
set -g popup-border-lines rounded
set -g popup-border-style "fg=#{@color_orange}"
set -g popup-style "bg=default"

# Menu styling (display-menu) — gold selection on ashen border
set -g menu-border-lines rounded
set -g menu-border-style "fg=#{@color_bg3}"
set -g menu-style "fg=#{@color_fg1},bg=#{@color_bg1}"
set -g menu-selected-style "fg=#{@color_bg0},bg=#{@color_yellow},bold"

# Command-prompt cursor matches the theme (tmux >= 3.5)
set -g prompt-cursor-colour "#e08060"  # coral (colour options can't reference @vars)

# Scrollbar only while in copy mode / view mode (tmux >= 3.6) — handy with mouse on
set -g pane-scrollbars modal
set -g pane-scrollbars-style "fg=#{@color_orange},bg=#{@color_bg1},width=1"

# Grace period before the first repeat of a -r binding counts (tmux >= 3.6);
# avoids H/L window-switch repeats swallowing an immediately-typed h/j/k/l
set -g initial-repeat-time 300

set -g display-time 2000
# Small nonzero value: 0 makes tmux misread a lone Esc in escape sequences over ssh
set -g escape-time 10

# Forward terminal focus events so nvim gets FocusGained/FocusLost (autoread, gitsigns)
set -g focus-events on
# OSC-52: copy-mode yanks land in the system clipboard, even over ssh
set -g set-clipboard on
# Default scrollback is a measly 2000 lines
set -g history-limit 50000
