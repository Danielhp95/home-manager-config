# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#                              TMUX CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# UI Layout {{{
set-option -sa terminal-overrides ',xterm-256color:Tc'

# To allow for base16 colors to propagate (this is needed from version 3.3 onwards)
set -g allow-passthrough on

# Takes environment from the parent shell (the shell that calls `tmux`)
set -ga update-environment EDITOR
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Statusline options
set-option -g status-position top
set -g status-style "bg=default"
set -g status-justify left

set -g renumber-windows on
set -g status-keys vi
set -g status-interval 2

# Window's name changes according to the process being run on them
set -g automatic-rename on
set-option -g automatic-rename-format "#{b:pane_current_path}: #{pane_current_command}"

# look for other sessions when exiting last pane of session
set-option -g detach-on-destroy off

# Elegant pane borders - subtle but visible
set -g pane-active-border-style "fg=#{@color_blue}"
set -g pane-border-style "fg=#{@color_bg2}"
set -g pane-border-lines single

# Message and command styling
set -g message-style "fg=#{@color_fg0},bg=#{@color_bg1},bold"
set -g message-command-style "fg=#{@color_fg0},bg=#{@color_bg1}"

# Mode styling (copy mode, etc.)
set -g mode-style "fg=#{@color_bg0},bg=#{@color_blue},bold"

set -g display-time 2000
# Allows for faster key repetition. Don't wait for new keys to be pressed.
set -g escape-time 0
# }}}
# Colorscheme and status-line {{{

# Color variables (theme-agnostic names)
# Background colors (darkest to lightest)
set -g @color_bg0 "#1e1e2e"
set -g @color_bg1 "#313244"
set -g @color_bg2 "#45475a"
set -g @color_bg3 "#585b70"
# Foreground/text colors (muted to bright)
set -g @color_fg0 "#cdd6f4"
set -g @color_fg1 "#a6adc8"
set -g @color_fg2 "#6c7086"
# Accent colors
set -g @color_blue "#89b4fa"
set -g @color_lavender "#b4befe"
set -g @color_sapphire "#74c7ec"
set -g @color_cyan "#89dceb"
set -g @color_teal "#94e2d5"
set -g @color_green "#a6e3a1"
set -g @color_yellow "#f9e2af"
set -g @color_orange "#fab387"
set -g @color_maroon "#eba0ac"
set -g @color_red "#f38ba8"
set -g @color_purple "#cba6f7"
set -g @color_pink "#f5c2e7"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Catppuccin-inspired elegant theme with refined powerline aesthetics        │
# └─────────────────────────────────────────────────────────────────────────────┘

# Color definitions (Catppuccin Mocha palette)
# Base:     #1e1e2e | Surface0: #313244 | Surface1: #45475a | Surface2: #585b70
# Text:     #cdd6f4 | Subtext:  #a6adc8 | Overlay:  #6c7086
# Blue:     #89b4fa | Lavender: #b4befe | Sapphire: #74c7ec | Sky:      #89dceb
# Teal:     #94e2d5 | Green:    #a6e3a1 | Yellow:   #f9e2af | Peach:    #fab387
# Maroon:   #eba0ac | Red:      #f38ba8 | Mauve:    #cba6f7 | Pink:     #f5c2e7

## WINDOWS - Clean tab-style design
set -g window-status-separator ""

# Inactive windows - subtle and elegant
set -g window-status-format "#[fg=#{@color_bg2},bg=default]#[fg=#{@color_fg1},bg=#{@color_bg2}] #I #[fg=#{@color_fg2}]#{?window_last_flag,󰁯 ,}#{?window_zoomed_flag,󰊓 ,}#[fg=#{@color_fg1}]#W #[fg=#{@color_bg2},bg=default]"

# Active window - vibrant but refined
set -g window-status-current-format "#[fg=#{@color_blue},bg=default]#[fg=#{@color_bg0},bg=#{@color_blue},bold] #I #[fg=#{@color_blue},bg=#{@color_purple}]#[fg=#{@color_bg0},bg=#{@color_purple},bold]#{?window_zoomed_flag, 󰊓,} #W #[fg=#{@color_purple},bg=default]"

## STATUS LEFT / RIGHT
set -g status-left-length 50
set -g status-right-length 150

# Left status bar - Session indicator with elegant prefix highlight
set -g status-left "#{?client_prefix,#[fg=#{@color_pink}],#[fg=#{@color_green}]}#[bg=default]#{?client_prefix,#[bg=#{@color_pink}],#[bg=#{@color_green}]}#[fg=#{@color_bg0},bold]  #S #{?client_prefix,#[fg=#{@color_pink}],#[fg=#{@color_green}]}#[bg=default] "

# Right status bar - Elegant information display
set -g status-right ""

# Git branch (if in a git repo)
set -ga status-right "#[fg=#{@color_bg2},bg=default]#[fg=#{@color_purple},bg=#{@color_bg2}] 󰊢 #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '–') "

# CPU usage with icon
set -ga status-right "#[fg=#{@color_bg1},bg=#{@color_bg2}]#[fg=#{@color_cyan},bg=#{@color_bg1}]  #(bash -c 'read cpu a b c d rest < /proc/stat; idle1=\$d; total1=\$((a+b+c+d)); sleep 0.2; read cpu a b c d rest < /proc/stat; idle2=\$d; total2=\$((a+b+c+d)); echo \$((100 * (total2 - total1 - (idle2 - idle1)) / (total2 - total1)))%%') "

# RAM usage with icon
set -ga status-right "#[fg=#{@color_bg2},bg=#{@color_bg1}]#[fg=#{@color_green},bg=#{@color_bg2}] 󰍛 #(free -m | awk '/Mem:/ {printf(\"%.1fG\", \$3/1024)}') "

# Date with icon
set -ga status-right "#[fg=#{@color_bg1},bg=#{@color_bg2}]#[fg=#{@color_yellow},bg=#{@color_bg1}] 󰃭 %a %d "

# Time with elegant accent
set -ga status-right "#[fg=#{@color_blue},bg=#{@color_bg1}]#[fg=#{@color_bg0},bold,bg=#{@color_blue}]  %H:%M #[fg=#{@color_blue},bg=default]"

# }}}
# Bindings {{{

# Explicitly unbind <prefix> p to prevent accidental previous pane action. For previous panel just use <mod><mod>
unbind p
# Set window split
bind-key v split-window -h
bind-key b split-window

bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# Make copy mode behave like vim
set-window-option -g mode-keys vi
# The -T ensures this binding only happens on table copy-mode-vi

bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi 'C-v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'v' send -X begin-selection \; send -X rectangle-toggle

# Switch to last active window
bind-key C-b last-window
# Switch to last active pane
bind ^A last-pane

# Use Alt + arrow (or vi bindings) keys to switch panes
# REMINDER: -n flag means "no prefix"
# -n: no prefix
# -r: repeatable
bind -r -n M-h select-pane -L
bind -r -n M-l select-pane -R
bind -r -n M-k select-pane -U
bind -r -n M-j select-pane -D

bind -r -n M-H resize-pane -L
bind -r -n M-L resize-pane -R
bind -r -n M-K resize-pane -U
bind -r -n M-J resize-pane -D

# bind HL to window traversal
bind -r H select-window -t :-
bind -r L select-window -t :+

# New windows and panes start in the current directory
bind c new-window -c "#{pane_current_path}"

# Temporary panes
bind R new-window -n serpl -c "#{pane_current_path}" serpl
bind t new-window -n btop "btop"
bind C new-window -n opencode "opencode"
# }}}
# Miscelaneous {{{
# Don't ring any bells. And don't take over the status bar for a measly notification
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Allows to use the mouse for various actions such as scrolling or changing active pane.
set-option -g mouse on

# Start windows and panes index at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on
# }}}
